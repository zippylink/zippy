# better-auth@1.4.21. It's a devDependency (libs/auth `auth:generate` schema codegen),
# never bundled. The deployed app uses better-auth@1.6.23. No cheap fix: the cli has no
# 1.6.x release. Revisit when @better-auth/cli ships a version tracking the runtime.
