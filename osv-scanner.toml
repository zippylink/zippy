# osv-scanner ignore list. Only PRE-EXISTING, transitive, dev-only advisories with no
# cheap fix belong here — each needs a reason + a review date. Runtime deps get fixed,
# not ignored. See AGENTS.md "vuln-scan".
#
# Every entry below was traced to its real parent in bun.lock and confirmed build-time
# only (dev CLI / codegen / toolchain), never in a deployed Worker or client bundle.
# The runtime app resolves the SAFE versions (better-auth@1.6.23, drizzle-orm@0.45.2,
# esbuild@0.28.1); the flagged copies are isolated under dev tooling that pins them.

# --- better-auth 1.4.21 (9 advisories) — @better-auth/cli devDep only ---
