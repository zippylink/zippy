<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@stack/widget — third-party embed demo</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 640px;
        margin: 60px auto;
        padding: 0 20px;
        color: #111;
        line-height: 1.6;
      }
      code {
        background: #f4f4f6;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <h1>A pretend third-party host page</h1>
    <p>
      This file is <strong>not</strong> part of the stack — it stands in for some random site that
      embeds our widget. It integrates with a single <code>&lt;script src&gt;</code> tag, exactly
      like a real customer would.
    </p>
    <p>
      Run <code>bun --filter @stack/widget build</code> first, then open this file. Look
      bottom-right.
    </p>

    <!-- The whole integration: one tag, config via data-* attributes. -->
    <script
      src="../dist/widget.js"
      data-endpoint="https://httpbin.org/post"
      data-label="Feedback"
      data-position="bottom-right"
    ></script>
  </body>
</html>
