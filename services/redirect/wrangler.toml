name = "zippy-redirect"
main = "src/index.ts"
compatibility_date = "2025-06-01"

# Custom domain (zipthe.link) — zone lives on this Cloudflare account.
# NOTE: must stay ABOVE the first [[table]] section or TOML swallows it.
routes = [
  { pattern = "zipthe.link", custom_domain = true }
]

# BASE_URL builds the shortUrl in API responses. Override per environment; the code
# NEVER hardcodes a domain. Local dev uses the wrangler dev URL below.
[vars]
BASE_URL = "https://zipthe.link"
LANDING_URL = "https://www.zipthe.link"
# ANDROID_FALLBACK_MEASURE = "1" points the Android intent's browser_fallback_url at our
# own /:slug?fb=1 instead of the destination, so a failed app-open comes back to US and is
# recorded as an OBSERVED "browser" outcome. UNSET = OFF: Android stays "unmeasured".
# Turn it on only after a real Android device confirms the fallback hop lands (deploy to
# the preview env first). No hardcoded domain — the fallback is built from BASE_URL, or
# from the request host on a tenant custom domain.
# BEST_EFFORT_ANDROID = "1" turns on the best-effort Android tier: for a destination whose host
# is NOT in the hand-verified deeplink table but publishes an Android package at its
# /.well-known/assetlinks.json (see services/redirect/src/well-known-map.json, regenerated by
# scripts/build-well-known-map.ts), Android visitors get a package-pinned intent:// app-open.
# UNSET = OFF. Android only; iOS/desktop are untouched. The open is UNMEASURED by construction
# (the intent falls back to the destination, never our fb=1 hop) and is labelled best-effort
# wherever a creator can see platform support.

# KV holds slug → destination. Create the namespace once, then paste the id here:
#   bunx wrangler kv namespace create LINKS
#   bunx wrangler kv namespace create LINKS --preview
# The command prints an `id` (and a `preview_id`) — fill them in below.
[[kv_namespaces]]
binding = "LINKS"
id = "649aee7fcd804124873bfe42c897d5ab"
preview_id = "12f8279145d94197b8c1797267457626"

# Analytics Engine sinks — the dataset is created on first write (no setup command).
# CLICKS = the /t beacon's app-open/browser outcome telemetry; REDIRECTS = one row per
# human redirect (click analytics: slug, geo, device, os, platform, referrer, campaign).
# Omitting either just turns that feature off — it never breaks a link.
#
# Analytics Engine enabled on the account 2026-07-18 (dashboard toggle). Datasets
# auto-create on first write. Self-hosters without AE: comment these two blocks out.
[[analytics_engine_datasets]]
binding = "CLICKS"
dataset = "zippy_outcomes"
[[analytics_engine_datasets]]
binding = "REDIRECTS"
dataset = "zippy_clicks"

# API_TOKEN gates POST/GET /api/links. It is a SECRET, not a var — synced from
# Infisical by zippy-cloud's ./deploy.sh engine <env> (never set by hand).
# With no token set, writes return 401.

# Preview env — deploys as zippy-redirect-preview on workers.dev against the
# preview KV namespace. Used by `../zippy-cloud/deploy.sh engine preview`.
[env.preview]
workers_dev = true
[env.preview.vars]
BASE_URL = "https://zippy-redirect-preview.shaisnir.workers.dev"
[[env.preview.kv_namespaces]]
binding = "LINKS"
id = "12f8279145d94197b8c1797267457626"

# Local dev: `wrangler dev` ignores routes; override the URL if you need correct
# local shortUrls: wrangler dev --var BASE_URL:http://localhost:8787
