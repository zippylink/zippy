# Example Kubernetes manifest for one service (@stack/api). Copy per service.
# Apply with:  kubectl apply -f infra/k8s/deployment.yaml
# Secrets (DATABASE_URL, etc.) come from a Secret you create out-of-band:
#   kubectl create secret generic stack-secrets --from-literal=DATABASE_URL='postgresql://...'
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stack-api
  labels:
    app: stack-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stack-api
  template:
    metadata:
      labels:
        app: stack-api
    spec:
      containers:
        - name: api
          image: ghcr.io/OWNER/stack-api:latest # ← push your built image here
          ports:
            - containerPort: 3001
          env:
            - name: API_PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: stack-secrets
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: stack-api
spec:
  selector:
    app: stack-api
  ports:
    - port: 80
      targetPort: 3001
  type: ClusterIP
